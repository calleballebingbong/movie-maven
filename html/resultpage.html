<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
    <link rel="icon" type="image/svg+xml" href="../images/logo.svg">
    <link rel="stylesheet" href="../css/site.css">
    <link rel="stylesheet" href="../css/search.css">
    <link rel="stylesheet" href="../css/mobileH.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Rethink+Sans:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <script src="../js/Key.js"></script>
</head>
<body>
    <header class="header-main">
        <div class="header-main-logo">
            <img src="../images/logo.svg" alt="logo" class="logo">
            <button class="hamburger" aria-label="Toggle navigation">☰</button>
            <nav class="header-main-nav">
                <ul>
                    <li><a href="../index.html">HOME</a></li>
                    <li><a href="movies.html">MOVIES</a></li>
                    <li><a href="aboutUs.html">ABOUT US</a></li>
                    <li><a href="contactUs.html">CONTACT</a></li>
                </ul>
            </nav>
        </div>
        <input onblur="hidesearch()" onfocus="showsearch()" 
        id="menuSearch" 
        class="search-input" 
        type="text" 
        placeholder="Search for a movie..." 
        onkeyup="menuSearchbar()">

        <div class = "menu-search-results" id="menuSearchResults"></div>
        <div class="header-main-sm">
            <div class="header-main-sm-ig"></div>
            <div class="header-main-sm-yt"></div>
        </div>
    </header>

    <div id="searchFor"></div>

    <hr>

    <div id="genreFilters" class="genre-filters"></div>
    <div id="languageFilters" class="language-filters"></div>

    <div id="searchresults"></div>
    <button id ="showMoreButton" class="get-started-btn" onclick="showMoreResults()">Show More</button>

    <script src="../js/tmbdapi.js"></script>
    <script src="../js/hideandshow.js"></script>
    <script src="../js/mobile-menu.js"></script>
</body>
</html>
