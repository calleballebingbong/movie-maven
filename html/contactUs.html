<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/site.css">
    <link rel="stylesheet" href="../css/homepage.css">
    <link rel="stylesheet" href="../css/mobileH.css">
    <style>
        table{
            margin-left: auto;
            margin-right: auto;
        }

    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Rethink+Sans:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <script src="../js/Key.js"></script>
</head>
<body>
        <header class="header-main">
        <div class="header-main-logo">
            <img src="../images/logo.svg" alt="logo" class="logo">
            <button class="hamburger" aria-label="Toggle navigation">☰</button>
            <nav class="header-main-nav">
                <ul>
                    <li><a href="../index.html">HOME</a></li>
                    <li><a href="movies.html">MOVIES</a></li>
                    <li><a href="aboutUs.html">ABOUT US</a></li>
                    <li><a href="contactUs.html">CONTACT</a></li>
                </ul>
            </nav>
        </div>
        <input onblur="hidesearch()" onfocus="showsearch()" 
        id="menuSearch" 
        class="search-input" 
        type="text" 
        placeholder="Search for a movie..." 
        onkeyup="menuSearchbar()">

        <div class = "menu-search-results" id="menuSearchResults"></div>
        <div class="header-main-sm">
            <div class="header-main-sm-ig"></div>
            <div class="header-main-sm-yt"></div>
        </div>
    </header>

    <section>
        <div class="contactUs">
            <h1>Contact us!</h1>
            <div class="container">
                <form id="contactForm" novalidate>
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    
                    <label for="reason">Reason:</label>
                    <select id="reason" name="reason">
                        <option value="feedback">Feedback</option>
                        <option value="complaint">Complaint</option>
                        <option value="other">Other</option>
                    </select>
                    
                    <label for="subject">Subject</label>
                    <textarea id="subject" name="subject" placeholder="Write something.." required></textarea>
                    
                    <input style="margin-left: 40%;" type="submit" value="Submit">
                    
                    <div id="formMessage" class="message hidden"></div>
                </form>
            </div>
        </div>
    </section>

    <table>
        <tr>
            <th>Office</th>
            <th>Contact</th>
            <th>Country</th>
        </tr>
        <tr>
            <td>Main Office:</td>
            <td>info@moviemaven.se</td>
            <td>Sweden</td>
        </tr>
        <tr>
            <td>Secondary Office:</td>
            <td>info@moviemaven.com</td>
            <td>United States</td>
        </tr>

        <tr>
            <td>Global Office:</td>
            <td>info@moviemaven.org</td>
            <td>-</td>
        </tr>
    </table>


    <script src="../js/tmbdapi.js"></script>
    <script src="../js/hideandshow.js"></script>
    <script src="../js/loadMovies.js"></script>
    <script src="../js/contactValidator.js"></script>
    <script src="../js/mobile-menu.js"></script>
</body>
</html>
