<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/site.css">
    <link rel="stylesheet" href="../css/homepage.css">
    <link rel="stylesheet" href="../css/movies.css">
    <link rel="stylesheet" href="../css/mobileH.css">
    <style>
        @media (max-width: 767px) {
        #infoPage {
            right: 25px;
        }
        }  
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Rethink+Sans:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <script src="../js/Key.js"></script>
</head>
<body>
    <header class="header-main">
        <div class="header-main-logo">
            <img src="../images/logo.svg" alt="logo" class="logo">
            <button class="hamburger" aria-label="Toggle navigation">☰</button>
            <nav class="header-main-nav">
                <ul>
                    <li><a href="../index.html">HOME</a></li>
                    <li><a href="movies.html">MOVIES</a></li>
                    <li><a href="aboutUs.html">ABOUT US</a></li>
                    <li><a href="contactUs.html">CONTACT</a></li>
                </ul>
            </nav>
        </div>
        <input onblur="hidesearch()" onfocus="showsearch()" 
        id="menuSearch" 
        class="search-input" 
        type="text" 
        placeholder="Search for a movie..." 
        onkeyup="menuSearchbar()">

        <div class = "menu-search-results" id="menuSearchResults"></div>
        <div class="header-main-sm">
            <div class="header-main-sm-ig"></div>
            <div class="header-main-sm-yt"></div>
        </div>
    </header>

    <section class="hero-carousel">
    <input type="radio" name="hero-slide" id="slide1" checked>
    <input type="radio" name="hero-slide" id="slide2">
    <input type="radio" name="hero-slide" id="slide3">
    
    <div class="hero-slide">
        <div class="hero-bg" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://image.tmdb.org/t/p/w1280/2P8l5Gys1h9a7gNj1QZBmjmYZ4X.jpg')"></div>
        <div class="hero-text">
        <div style="background-color: transparent;" class="search-container">   
        <h1>Search for a Movie</h1>

        <form>
            <input type="text" id="txtSearch" placeholder="Search for movies">
        </form>
    </div>
        </div>
    </div>
    </section>

    
    <section id="infoPage">
        <div id="aboutUs">
                <section class="movie-category">
        <h2>Popular Movies:</h2>
        <div id="popularMovies"></div>
    </section>

    <section class="movie-category">
        <h2>Now Showing:</h2>
        <div id="nowShowing"></div>
    </section>

    <section class="movie-category">
        <h2>Genre Filter</h2>
        <label for="genreSelect">Choose genre:</label>
        <select id="genreSelect">
            <option value="">Select a genre</option>
            <option value="28">Action</option>
            <option value="35">Comedy</option>
            <option value="18">Drama</option>
            <option value="27">Horror</option>
            <option value="10749">Romance</option>
        </select>

        <div id="genreMovies"></div>
    </section>

    <section class="movie-category">
        <h2>New Releases</h2>
        <div id="randomTrailersContainer">
            <div id="randomTrailer1"></div>
            <div id="randomTrailer2"></div>
        </div>
    </section>
        </div>

    <script src="../js/tmbdapi.js"></script>
    <script src="../js/hideandshow.js"></script>
    <script src="../js/loadMovies.js"></script>
    <script src="../js/getRandomImage.js"></script>
    <script src="../js/mobile-menu.js"></script>

</body>


</html>
